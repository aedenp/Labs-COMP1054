<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section | Creative Agency</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">AGENCY</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Work</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero / Banner Section -->
    <section class="hero">
        <div class="container hero-container">
            <div class="hero-content">
                <!-- Main heading -->
                <h1 class="main-heading">Modern creativity<br>for bold brands</h1>
                <!-- Supporting text -->
                <p class="supporting-text">We help startups and agencies launch beautiful, functional websites that drive results.</p>
                <!-- Call-to-action button -->
                <button class="cta-button">Start a project →</button>
            </div>
            <!-- Actual image from Unsplash -->
            <div class="image-placeholder">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&h=600&fit=crop" 
                     alt="Creative team collaborating in modern office" 
                     class="hero-image">
            </div>
        </div>
    </section>
</body>
</html>
